<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>සුභ අලුත් අවුරුද්දක්!</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: "Noto Sans Sinhala", Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            background: black;
            color: white;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(0,0,0,0.5);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: fadeIn 2s ease, float 3s ease-in-out infinite;
            box-shadow: 0 0 25px rgba(255,255,255,0.6);
        }

        h1 {
            font-size: 42px;
        }

        p {
            font-size: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="card">
    <h1>🌸 සුභ අලුත් අවුරුද්දක්! 🌸</h1>
    <p>ඔබට සහ ඔබගේ පවුලේ සැමට</p>
    <p>සතුට, සෞභාග්‍යය, සහ සම්පත් පිරි</p>
    <p>සුභ නව වසරක් වේවා! 🎉</p>
</div>

<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y) {
    for (let i = 0; i < 80; i++) {
        particles.push({
            x: x,
            y: y,
            speedX: (Math.random() - 0.5) * 6,
            speedY: (Math.random() - 0.5) * 6,
            life: 100,
            color: `hsl(${Math.random() * 360}, 100%, 60%)`
        });
    }
}

function updateParticles() {
    for (let i = 0; i < particles.length; i++) {
        let p = particles[i];
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
    }

    particles = particles.filter(p => p.life > 0);
}

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    updateParticles();

    requestAnimationFrame(animate);
}

// Auto fireworks
setInterval(() => {
    createFirework(
        Math.random() * canvas.width,
        Math.random() * canvas.height / 2
    );
}, 800);

// Click fireworks
window.addEventListener("click", (e) => {
    createFirework(e.clientX, e.clientY);
});

animate();
</script>

</body>
</html>
