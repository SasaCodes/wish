<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සුභ අලුත් අවුරුද්දක්!</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: "Noto Sans Sinhala", Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(270deg, #ff7e5f, #feb47b, #ffcc70, #ff8177);
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;

            color: white;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(0,0,0,0.6);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;

            animation: fadeIn 2s ease, float 3s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255,255,255,0.8);
        }

        h1 {
            font-size: clamp(24px, 6vw, 42px);
            text-shadow: 0 0 10px #fff;
        }

        p {
            font-size: clamp(14px, 4vw, 20px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="card">
    <h1>🌸 සුභ අලුත් අවුරුද්දක්! 🌸</h1>
    <p>ඔබට සහ ඔබගේ පවුලේ සැමට</p>
    <p>සතුට, සෞභාග්‍යය, සහ සම්පත් පිරි</p>
    <p>සුභ නව වසරක් වේවා! 🎉</p>
</div>

<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles = [];

function createFirework(x, y) {
    for (let i = 0; i < 80; i++) {
        particles.push({
            x: x,
            y: y,
            speedX: (Math.random() - 0.5) * 6,
            speedY: (Math.random() - 0.5) * 6,
            life: 100,
            color: `hsl(${Math.random() * 360}, 100%, 60%)`
        });
    }
}

function updateParticles() {
    for (let i = 0; i < particles.length; i++) {
        let p = particles[i];
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
    }

    particles = particles.filter(p => p.life > 0);
}

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    updateParticles();
    requestAnimationFrame(animate);
}

// 🎆 Auto fireworks
setInterval(() => {
    createFirework(
        Math.random() * canvas.width,
        Math.random() * canvas.height / 2
    );
}, 900);

// 📱 Touch + Click support
function triggerFirework(e) {
    let x = e.touches ? e.touches[0].clientX : e.clientX;
    let y = e.touches ? e.touches[0].clientY : e.clientY;
    createFirework(x, y);
}

window.addEventListener("click", triggerFirework);
window.addEventListener("touchstart", triggerFirework);

animate();
</script>

</body>
</html>
